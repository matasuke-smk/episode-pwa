<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#222">
  <title>話数ビューア</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <form id="urlForm">
      <button type="button" id="pasteBtn" class="icon-btn" aria-label="ペースト">📋</button>
      <input type="url" id="urlInput" placeholder="URL を入力" inputmode="url" autocomplete="off" required>
      <button type="submit">開く</button>
      <button type="button" id="bookmarkBtn" class="icon-btn" aria-label="ブックマーク">★</button>
    </form>
  </header>
  <main>
    <iframe id="viewer" referrerpolicy="unsafe-url"></iframe>
    <section id="bookmarkPanel" hidden>
      <div class="bm-header">
        <span>ブックマーク</span>
        <button type="button" id="bmCloseBtn" class="icon-btn" aria-label="閉じる">✕</button>
      </div>
      <button type="button" id="bmAddBtn" class="bm-add">＋ 現在のURLを追加</button>
      <ul id="bmList"></ul>
      <p id="bmEmpty" class="bm-empty">ブックマークはまだありません</p>
    </section>
  </main>
  <footer>
    <button id="prevBtn" type="button" aria-label="前の話">←</button>
    <button id="nextBtn" type="button" aria-label="次の話">→</button>
  </footer>
  <script src="app.js"></script>
</body>
</html>
